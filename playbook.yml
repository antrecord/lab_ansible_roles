---
- name: Install nginx with Virtual Hosts
  hosts: webservers
  remote_user: runner
  become: true
  become_method: sudo
  gather_facts: no

  vars:
    sites:
    - "etis.com"
    - "fizfak.com"
    - "mehmat.ru"

  roles:
  - nginx-vhosts

- name: Play to update local hosts file
  hosts: localhost
  become: true

  vars:
    sites:
      - "etis.com"
      - "fizfak.com"
      - "mehmat.ru"

  tasks:
  - ansible.builtin.debug: { msg: "{{ item }}" }
    loop:  "{{ groups['webservers'] }}"
    
  - name: "Build hosts file"
    blockinfile:
      dest: /etc/hosts
      block: |
        {% for host_ip in groups['webservers'] %}
        {% for host_name in sites %}
        {{ host_ip }} {{ host_name }}
        {% endfor %}
        {% endfor %}